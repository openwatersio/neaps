name: CI
on:
  push:

jobs:
  changeset:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install modules
        run: npm install

      - name: Fetch base branch
        run: git fetch origin main --depth=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install modules
        run: npm install

      - name: Lint code
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install modules
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      # Do not run npm build here! This intentonally runs tests against the unbuilt source
      # to ensure that the tests are properly configured to run against the source files.

      - name: Test
        run: npm run coverage

      - name: Report coverage
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          fail_ci_if_error: true
          files: ./coverage/coverage-final.json

  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install modules
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish to pkg.pr.new
        run: npx pkg-pr-new publish ./packages/*

  benchmarks:
    runs-on: ubuntu-latest
    concurrency:
      group: benchmarks-${{ github.ref }}
      cancel-in-progress: true
    env:
      FAST: ${{ github.ref != 'refs/heads/main' && 'true' || '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install modules
        run: npm install

      - name: Build
        run: npm run build

      - name: Cache benchmark data
        id: benchmark-cache
        uses: actions/cache@v5
        with:
          path: .test-cache
          key: benchmarks-${{ env.FAST }}-${{ hashFiles('benchmarks/noaa.ts') }}

      - name: Run benchmarks
        run: npm run benchmarks

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: benchmarks/*.csv

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install modules
        run: npm install

      - name: Build
        run: npm run build

      - name: Run examples
        run: for e in examples/*.ts; do node "$e"; done
